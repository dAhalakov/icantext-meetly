<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Meeting Planner</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="app" style="display:none;" id="app">

            <h1>Meeting Planner</h1>

            <div class="create-event">
                <input type="text" id="eventTitle" placeholder="Event title">

                <select id="durationSelect">
                    <option value="15">15 min</option>
                    <option value="30">30 min</option>
                    <option value="45">45 min</option>
                    <option value="60">1 hour</option>
                    <option value="120">2 hours</option>
                    <option value="180">3 hours</option>
                    <option value="240">4 hours</option>
                    <option value="allday">All day</option>
                </select>

                <input type="datetime-local" id="dateInputStart">

                <button id="addDateBtn">Add date</button>
                <button id="createEventBtn">Create event</button>
            </div>

            <div id="datesList"></div>

            <div id="pollSection" class="hidden">
                <h2 id="pollTitle"></h2>
                <table id="pollTable"></table>
            </div>

        </div>

        <div id="standalone-info">
            <h2 style="color:#fff;">Meetly Micro-App</h2>
            <p>Sondages à choix multiples : Pour voter sur des options (restaurant, priorité de projet) avec mise à jour des barres de progression en temps réel.</p> 
            <p>To use it, install it in a channel or launch it with the command:</p>
            <code>/app https://dahalakov.github.io/icantext-test/</code>
        </div>

        <script src="https://icantext.com/ICTBridgeSDK.js"></script>
        <script>
            const sdk = new ICTBridgeSDK("meetly_app");

            let connection;
            let localPeerId;

            async function init(){
                connection = await sdk.init();
                if(connection.status === "STANDALONE"){
                    document.getElementById("creator").style.display="none";
                    return;
                }
                localPeerId = connection.localPeerId;
                const mode = sdk.getDisplayMode();
                if(mode === "MESSAGE"){
                    startPoll();
                }else{
                    startCreator();
                }
            }
            init();


            let dates=[];

            function startCreator(){
                document.getElementById("standalone").style.display="none";
                const addBtn = document.getElementById("addDate");
                const createBtn = document.getElementById("create");
                const datesDiv = document.getElementById("dates");

                addBtn.onclick=()=>{
                    const val=document.getElementById("dateInput").value;
                    if(!val)return;
                    dates.push(val);
                    renderDates();
                };

                function renderDates(){
                    datesDiv.innerHTML="";
                    dates.forEach((d,i)=>{
                    const div=document.createElement("div");
                    div.innerHTML=d+" <button onclick='removeDate("+i+")'>X</button>";
                    datesDiv.appendChild(div);
                    });
                }

                window.removeDate=function(i){
                    dates.splice(i,1);
                    renderDates();
                };

                createBtn.onclick=async()=>{
                    const title=document.getElementById("title").value;
                    const duration=document.getElementById("duration").value;
                    if(!title||dates.length===0)return;
                    await sdk.postAppContent(
                        window.location.href,
                        {
                            title:title,
                            dates:dates,
                            duration:duration
                        },
                        {
                            interactionModel:'OWNER_ONLY'
                        }
                    );
                };  
            }


            let context;
            let votes={};

            async function startPoll(){
                document.getElementById("creator").style.display="none";
                document.getElementById("poll").style.display="block";
                document.getElementById("standalone").style.display="none";
                context = await sdk.getAppContext();
                document.getElementById("pollTitle").innerText=context.title;
                const history = await sdk.getAppEvents();
                history.forEach(e=>{
                    votes[e.senderId]=e.data.vote;
                });
                render();
                // listen real-time votes
                sdk.onAppEvent((senderId,data)=>{
                    votes[senderId]=data.vote;
                    render();
                });
            }


            function render(){
                const table=document.getElementById("table");
                table.innerHTML="";
                const header=document.createElement("tr");
                header.innerHTML="<th>User</th>";
                context.dates.forEach(d=>{
                    header.innerHTML+="<th>"+formatDate(d)+"</th>";
                });
                header.innerHTML+="<th>Action</th>";
                table.appendChild(header);


                // current user row
                const row=document.createElement("tr");
                row.innerHTML="<td>Me</td>";
                const myVote=votes[localPeerId]||[];
                context.dates.forEach((d,i)=>{
                    const td=document.createElement("td");
                    const cb=document.createElement("input");
                    cb.type="checkbox";
                    cb.checked=myVote.includes(i);
                    if(votes[localPeerId]) cb.disabled=true;
                    td.appendChild(cb);
                    row.appendChild(td);
                });

                const action=document.createElement("td");
                if(!votes[localPeerId]){
                    const btn=document.createElement("button");
                    btn.innerText="Vote";
                    btn.onclick=()=>{
                        const selected=[];
                        const cbs=row.querySelectorAll("input");
                        cbs.forEach((c,i)=>{
                            if(c.checked)selected.push(i);
                        });
                        sdk.emitAppEvent({
                            vote:selected
                        });
                    };
                    action.appendChild(btn);
                }else{
                    const btn=document.createElement("button");
                    btn.innerText="Remove vote";
                    btn.onclick=()=>{
                        sdk.emitAppEvent({
                            vote:[]
                        });
                    };
                    action.appendChild(btn);
                }
                row.appendChild(action);
                table.appendChild(row);


                // results
                const result=document.createElement("tr");
                result.innerHTML="<td><b>Votes</b></td>";
                context.dates.forEach((d,i)=>{
                    let count=0;
                    for(let u in votes){
                        if(votes[u].includes(i))count++;
                    }
                    result.innerHTML+="<td><b>"+count+"</b></td>";
                });
                result.innerHTML+="<td></td>";
                table.appendChild(result);
            }

            function formatDate(d){
                const date=new Date(d);
                return date.toLocaleString();
            }
        </script>
    </body>
</html>
